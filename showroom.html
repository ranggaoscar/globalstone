<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom Virtual | Global Stone</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .showcase-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        body {
            overflow: hidden; /* Prevent scrolling on 3D showcase */
            padding-bottom: 0; 
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            background-color: var(--bg-light);
            cursor: grab;
        }
        
        #canvas-container:active {
            cursor: grabbing;
        }

        /* 3D Tooltip Overlay */
        #data-tooltip {
            position: absolute;
            top: -1000px;
            left: -1000px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid var(--steel-blue);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 1.5rem;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 20;
            min-width: 250px;
        }

        #data-tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--steel-blue);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 0.5rem;
        }

        .tooltip-data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .tooltip-label {
            color: var(--concrete-grey);
            font-weight: 600;
        }

        .tooltip-value {
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .instruction-overlay {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            color: var(--steel-blue);
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* Mobile specific styles */
        @media (max-width: 768px) {
            .instruction-overlay {
                width: 90%;
                font-size: 0.85rem;
                bottom: 120px;
                padding: 0.8rem 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header class="showcase-header">
        <div class="container nav-container" style="padding: 1rem 0;">
            <div class="logo">Global Stone</div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="materials.html">Stock Update</a></li>
                    <li><a href="showroom.html" class="active">Showroom Virtual</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div id="canvas-container"></div>
    
    <div class="instruction-overlay">
        Interaksi: Putar (Klik + Drag) & Hover slab batu untuk melihat data stok.
    </div>

    <!-- Data Tooltip -->
    <div id="data-tooltip">
        <div class="tooltip-title" id="tt-title">Stone Name</div>
        <div class="tooltip-data-row">
            <span class="tooltip-label">Kategori:</span>
            <span class="tooltip-value" id="tt-cat">Unknown</span>
        </div>
        <div class="tooltip-data-row">
            <span class="tooltip-label">Ready Stock (m2):</span>
            <span class="tooltip-value" id="tt-m2">0</span>
        </div>
        <div class="tooltip-data-row">
            <span class="tooltip-label">Total Slab:</span>
            <span class="tooltip-value" id="tt-slab">0</span>
        </div>
    </div>

    <!-- Floating CTA -->
    <a href="https://wa.me/6281287875820" target="_blank" class="floating-cta">
        <span>Cek stok & harga: WA 0812-8787-5820 | globalstoneofficial.com</span>
    </a>

    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Custom 3D Script -->
    <script src="showroom3d.js"></script>
</body>
</html>
